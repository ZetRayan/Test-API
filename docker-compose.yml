version: '3.8'

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: org_db
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d org_db"]
      interval: 5s
      timeout: 5s
      retries: 5


  api:
    build: .
    ports:
      - "8000:8000"
    environment:

      - DATABASE_URL=postgresql://admin:rootpassword@db:5432/org_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app


volumes:
  postgres_data: